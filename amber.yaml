
substitutions:
  name: amber-electric
  friendly_name: Host lvgl test

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  platformio_options:
    build_flags:
    - -g3
    - -DLV_LOG_TRACE_ANIM=1

host:
  mac_address: "62:23:45:AF:B3:DD"

json:

time:
  - platform: host
    id: sntp_time

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API

# HTTP request component for API calls
http_request:
  useragent: esphome/amber-electric
  timeout: 10s

# Interval to poll the API every 5 minutes
interval:
  - interval: 5min
    then:
      - http_request.get:
          capture_response: true
          max_response_buffer_size: 4096
          url: !lambda |-
            const char* site_id = "01H47SWFZWX63ERAP0PGBXZCJZ";
            return ((std::string)"https://api.amber.com.au/v1/sites/" + site_id + "/prices/current?next=1");
          request_headers:
            Authorization: "Bearer psk_179eab380e5e243f54b796ab1abba85c"
            Accept: "application/json"
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGE("amber", "HTTP Request failed with status code: %d", response->status_code);
                    ESP_LOGE("amber", "Response: %s", body.c_str());
                    return;
                  }
                  
                  ESP_LOGD("amber", "API Response received, parsing JSON length %zu", body.size());
                  ESP_LOGD("amber", "Raw response: %s", body.c_str());
                  
                  // Parse JSON array using parse_json that returns a JsonDocument
                  JsonDocument doc = json::parse_json(body);
                  JsonArray root = doc.as<JsonArray>();
                  
                  if (root.isNull() || root.size() == 0) {
                    ESP_LOGE("amber", "Failed to parse JSON or empty price array");
                    return;
                  }

                  
                  // Track which prices we've found
                  bool found_import = false;
                  bool found_feedin = false;
                  bool found_next_import = false;
                  bool found_next_feedin = false;
                  
                  // Iterate through all periods
                  for (size_t i = 0; i < root.size(); i++) {
                    JsonObject period = root[i];
                    
                    if (!period.containsKey("channelType") || !period.containsKey("perKwh")) {
                      ESP_LOGW("amber", "Period %d missing required fields", i);
                      continue;
                    }
                    
                    std::string channel_type = period["channelType"].as<std::string>();
                    float price = period["perKwh"];
                    
                    // Determine if this is current or next period based on order
                    bool is_current = (i < 2);  // First two entries are current prices
                    bool is_next = (i >= 2);     // Next two entries are forecast prices
                      
                      // Process based on channel type
                      if (channel_type == "general") {
                        if (is_current && !found_import) {
                          // Current import price
                          id(current_import_price).publish_state(price);
                          ESP_LOGI("amber", "Current Import Price: %.2f c/kWh", price);
                          found_import = true;
                          
                          // Extract additional current period data
                          if (period.containsKey("descriptor")) {
                            std::string descriptor = period["descriptor"].as<std::string>();
                            id(price_descriptor).publish_state(descriptor);
                            ESP_LOGI("amber", "Price Descriptor: %s", descriptor.c_str());
                          }
                          
                          if (period.containsKey("renewables")) {
                            float renewables = period["renewables"];
                            id(renewable_percentage).publish_state(renewables);
                            ESP_LOGI("amber", "Renewables: %.1f%%", renewables);
                          }
                          
                          if (period.containsKey("startTime")) {
                            std::string start_time = period["startTime"].as<std::string>();
                            id(current_period_start).publish_state(start_time);
                          }
                          
                        } else if (is_next && !found_next_import) {
                          // Next period import price
                          id(next_import_price).publish_state(price);
                          ESP_LOGI("amber", "Next Period Import Price: %.2f c/kWh", price);
                          found_next_import = true;
                          
                          if (period.containsKey("startTime")) {
                            std::string start_time = period["startTime"].as<std::string>();
                            id(next_period_start).publish_state(start_time);
                          }
                        }
                        
                      } else if (channel_type == "feedIn") {
                        if (is_current && !found_feedin) {
                          // Current feed-in price
                          id(current_feedin_price).publish_state(price);
                          ESP_LOGI("amber", "Current Feed-in Price: %.2f c/kWh", price);
                          found_feedin = true;
                          
                        } else if (is_next && !found_next_feedin) {
                          // Next period feed-in price
                          id(next_feedin_price).publish_state(price);
                          ESP_LOGI("amber", "Next Period Feed-in Price: %.2f c/kWh", price);
                          found_next_feedin = true;
                        }
                      }
                    }
                    
                    // Update last successful update time
                    id(last_update).publish_state(id(sntp_time).now().timestamp);
                    
                    if (!found_import) {
                      ESP_LOGE("amber", "Failed to find current import price in response");
                    }
                    
                    ESP_LOGI("amber", "Successfully parsed prices - Import: %s, FeedIn: %s, Next Import: %s, Next FeedIn: %s",
                      found_import ? "✓" : "✗",
                      found_feedin ? "✓" : "✗", 
                      found_next_import ? "✓" : "✗",
                      found_next_feedin ? "✓" : "✗");

# Text sensors
text_sensor:
  - platform: template
    name: "Amber Price Descriptor"
    id: price_descriptor
    icon: "mdi:alert-circle"
    
  - platform: template
    name: "Current Period Start Time"
    id: current_period_start
    icon: "mdi:clock-start"
    
  - platform: template
    name: "Next Period Start Time"
    id: next_period_start
    icon: "mdi:clock-outline"

# Numeric sensors
sensor:
  - platform: template
    name: "Current Import Price"
    id: current_import_price
    unit_of_measurement: "c/kWh"
    accuracy_decimals: 2
    device_class: monetary
    state_class: measurement
    icon: "mdi:cash"
    
  - platform: template
    name: "Current Feed-in Price"
    id: current_feedin_price
    unit_of_measurement: "c/kWh"
    accuracy_decimals: 2
    device_class: monetary
    state_class: measurement
    icon: "mdi:solar-power"
    
  - platform: template
    name: "Next Period Import Price"
    id: next_import_price
    unit_of_measurement: "c/kWh"
    accuracy_decimals: 2
    device_class: monetary
    state_class: measurement
    icon: "mdi:cash-clock"
    
  - platform: template
    name: "Next Period Feed-in Price"
    id: next_feedin_price
    unit_of_measurement: "c/kWh"
    accuracy_decimals: 2
    device_class: monetary
    state_class: measurement
    icon: "mdi:solar-power-variant"
    
  - platform: template
    name: "Renewable Percentage"
    id: renewable_percentage
    unit_of_measurement: "%"
    accuracy_decimals: 1
    icon: "mdi:leaf"
    state_class: measurement
    
  - platform: template
    name: "Last Update"
    id: last_update
    device_class: timestamp
    icon: "mdi:update"

# Binary sensor for price spike detection
binary_sensor:
  - platform: template
    name: "Price Spike Active"
    id: price_spike
    device_class: problem
    lambda: |-
      std::string descriptor = id(price_descriptor).state;
      return (descriptor == "spike" || descriptor == "extremelyHigh");
