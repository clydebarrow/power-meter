substitutions:
  friendly_name: Power Meter
  name: power-meter

#external_components:
  #- source: github://pr#14614
    #components: [modbus, uart]
    #refresh: 1h

esp32:
  variant: esp32s3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true

psram:
  mode: octal
  speed: 80MHz

api:
  encryption:
    key: !secret encryption_key

web_server:
  include_internal: true
  version: 3
  auth:
    username: esphome
    password: !secret wifi_password

logger:
  level: DEBUG
  hardware_uart: UART0
  logs:
    wifi: INFO
    modbus_controller.sensor: INFO
    modbus_controller: INFO
    sensor: INFO
    homeassistant.sensor: INFO
    values: DEBUG
    offsets: DEBUG

time:
  - platform: homeassistant

udp:
  addresses: 192.168.1.50

#syslog:

wifi: !include wifi.yaml

sensor:
  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 10s
    entity_category: "diagnostic"
  - platform: debug
    free:
      name: "Heap Free"
    loop_time:
      name: "Loop Time"
    psram:
      name: "Free PSRAM"

debug:

  
ota:
  platform: esphome
  password: !secret ota_password

usb_host:
  #max_transfer_requests: 8
usb_uart:
  - type: ch34X
    id: ch34x
    channels:
      - id: uch_1
        baud_rate: 9600
        buffer_size: 1024
        debug: false
        dummy_receiver: false
      - id: uch_2
        baud_rate: 9600
        buffer_size: 1024
        debug: false
        dummy_receiver: false
      - id: uch_3
        buffer_size: 1024
        baud_rate: 9600
        debug: false
        dummy_receiver: false

ch422g:

packages:
  base: !include standard.yaml
  lvgl: !include power-meter-lvgl.yaml
  modbus: !include power-meter-modbus.yaml
  climate: !include power-meter-logic.yaml

i2c:
  sda: 8
  scl: 9
  frequency: 400kHz
  scan: false
  id: bus_a

output:
  - platform: ledc
    id: backlight_output
    pin: 11
    frequency: 1220Hz
    inverted: true

touchscreen:
  - platform: gt911
    address: 0x5D
    id: my_touchscreen
    update_interval: 16ms
    interrupt_pin: 4
    reset_pin:
      ch422g:
      number: 1
    on_release:
      then:
        - if:
            condition: lvgl.is_paused
            then:
              - lvgl.resume:
              - lvgl.widget.redraw:
              - light.turn_on: lcd_backlight
  

display:
  - platform: mipi_rgb
    model: ESP32-S3-TOUCH-LCD-4.3
    id: rpi_disp

text_sensor:
  - platform: debug
    reset_reason:
      name: Reset reason
