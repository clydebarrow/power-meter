sensor:
- platform: modbus_controller
  modbus_controller_id: modbus_client
  id: pm_absorb
  name: "Absorbing Energy"
  register_type: holding
  address: 0x47
  device_class: "energy"
  state_class: "total_increasing"
  value_type: FP32
  unit_of_measurement: kWh
  filters:
    - multiply: 0.001
- platform: modbus_controller
  modbus_controller_id: modbus_client
  id: pm_release
  name: "Releasing Energy"
  register_type: holding
  address: 0x49
  device_class: "energy"
  state_class: "total_increasing"
  value_type: FP32
  unit_of_measurement: kWh
  filters:
    - multiply: 0.001
    - sliding_window_moving_average:
        window_size: 5
        send_every: 5
    - timeout: 15s
- platform: modbus_controller
  modbus_controller_id: modbus_client
  id: pm_reactive
  name: "Reactive Energy"
  register_type: holding
  address: 0x4B
  device_class: "energy"
  state_class: measurement
  value_type: FP32
  unit_of_measurement: kWh
  filters:
    - multiply: 0.001
    - sliding_window_moving_average:
        window_size: 5
        send_every: 5
    - timeout: 15s
- platform: modbus_controller
  modbus_controller_id: modbus_client
  id: pm_capacitive
  name: "Capacitive Reactive Energy"
  register_type: holding
  address: 0x4D
  device_class: "energy"
  state_class: measurement
  value_type: FP32
  unit_of_measurement: kWh
  filters:
    - multiply: 0.001

- platform: modbus_controller
  modbus_controller_id: modbus_client
  id: pm_volts
  name: "AC Voltage"
  register_type: holding
  address: 0x61
  register_count: 3
  device_class: "voltage"
  state_class: measurement
  unit_of_measurement: "V"
  value_type: U_WORD
  filters:
    - multiply: 0.1
    - sliding_window_moving_average:
        window_size: 5
        send_every: 5
    - timeout: 15s
    
  on_value:
    then:
      - script.execute:
          id: voltage_label_update
          x: !lambda return x;
            
- platform: modbus_controller
  id: pm_current
  modbus_controller_id: modbus_client
  name: "AC Current"
  register_type: holding
  address: 0x64
  register_count: 2
  device_class: "current"
  state_class: measurement
  unit_of_measurement: "A"
  value_type: U_WORD
  filters:
    - multiply: 0.01
    - sliding_window_moving_average:
        window_size: 5
        send_every: 5
    - timeout: 15s
- platform: modbus_controller
  id: pm_unknown1
  name: PM Unknown 1
  modbus_controller_id: modbus_client
  register_type: holding
  address: 0x66
- platform: modbus_controller
  id: pm_power
  modbus_controller_id: modbus_client
  name: "AC Power"
  register_type: holding
  address: 0x67
  value_type: S_WORD
  register_count: 3
  device_class: "power"
  state_class: measurement
  unit_of_measurement: "W"
  filters:
    - sliding_window_moving_average:
        window_size: 5
        send_every: 5
    - timeout: 15s
  on_value:
    then:
      - script.execute:
          id: power_label_update
          x: !lambda return x;
- platform: modbus_controller
  id: pm_power_2
  name: "AC Power 2"
  modbus_controller_id: modbus_client
  register_type: holding
  address: 0x6A
- platform: modbus_controller
  id: q_value
  name: "Reactive power"
  unit_of_measurement: "VAR"
  modbus_controller_id: modbus_client
  state_class: measurement
  register_type: holding
  value_type: S_WORD
  address: 0x6B
  register_count: 3
- platform: modbus_controller
  id: pm_unknown3
  modbus_controller_id: modbus_client
  register_type: holding
  address: 0x6E
- platform: modbus_controller
  name: "Apparent power"
  unit_of_measurement: "VA"
  state_class: measurement
  id: s_value
  modbus_controller_id: modbus_client
  register_type: holding
  address: 0x6F
  register_count: 3
- platform: modbus_controller
  id: pm_unknown4
  modbus_controller_id: modbus_client
  register_type: holding
  address: 0x72
- platform: modbus_controller
  id: pm_pf
  modbus_controller_id: modbus_client
  name: "Power factor"
  register_type: holding
  address: 0x73
  register_count: 3
  value_type: S_WORD
  state_class: measurement
  filters:
    - multiply: 0.01
- platform: modbus_controller
  id: pm_unknown5
  modbus_controller_id: modbus_client
  register_type: holding
  address: 0x76
- platform: modbus_controller
  id: f_value
  name: "AC Frequency"
  modbus_controller_id: modbus_client
  register_type: holding
  address: 0x77
  register_count: 4
  value_type: U_WORD
  device_class: frequency
  state_class: measurement
  unit_of_measurement: "Hz"
  filters:
    - multiply: 0.01
    - sliding_window_moving_average:
        window_size: 5
        send_every: 5
    - timeout: 15s

- platform: template
  name: Power Buy
  id: power_buy
  device_class: power
  unit_of_measurement: "W"
  state_class: measurement
  update_interval: 2s
  lambda: |-
    auto s = id(pm_power).state;
    return s < 0 ? -s : 0;

- platform: template
  name: Power Sell
  id: power_sell
  device_class: power
  state_class: measurement
  unit_of_measurement: "W"
  update_interval: 2s
  lambda: |-
    auto s = id(pm_power).state;
    return s > 0 ? s : 0;
