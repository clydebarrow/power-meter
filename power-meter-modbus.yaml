modbus:
  - id: modbus1
    uart_id: uch_1
  - id: modbus2
    uart_id: uch_2
    role: server
  - id: modbus3
    uart_id: uch_3
    role: server


modbus_controller:
  - id: modbus_client
    update_interval: 0.5s
    address: 0x3   ## address of the Modbus slave device on the bus
    modbus_id: modbus1
    setup_priority: -10

modbus_server:
  - id: modbus_server_1
    modbus_id: modbus2
    address: 0x3
    registers:
      - address: 0x47
        value_type: FP32
        read_lambda: return id(pm_absorb).get_raw_state();
      - address: 0x49
        value_type: FP32
        read_lambda: return id(pm_release).get_raw_state();
      - address: 0x4B
        value_type: FP32
        read_lambda: return id(pm_reactive).get_raw_state();
      - address: 0x4D
        value_type: FP32
        read_lambda: return id(pm_capacitive).get_raw_state();

      - address: 0x61
        value_type: U_WORD
        read_lambda: return id(pm_volts).get_raw_state();
      - address: 0x62
        value_type: U_WORD
        read_lambda: return 0;
      - address: 0x63
        value_type: U_WORD
        read_lambda: return 0;
      - address: 0x64
        value_type: U_WORD
        read_lambda: return id(pm_current).get_raw_state();
      - address: 0x65
        value_type: U_WORD
        read_lambda: return 0;
      - address: 0x66
        value_type: U_WORD
        read_lambda: return id(pm_unknown1).get_raw_state();
      - address: 0x67
        value_type: S_WORD
        read_lambda: return id(pm_power).get_raw_state() + id(inverter_1_power_offset).state;
      - address: 0x68
        value_type: U_WORD
        read_lambda: return 0;
      - address: 0x69
        value_type: U_WORD
        read_lambda: return 0;
      - address: 0x6A
        value_type: U_WORD
        read_lambda: return id(pm_power_2).get_raw_state() + id(inverter_1_power_offset).state;

      - address: 0x6B
        value_type: S_WORD
        read_lambda: return id(q_value).get_raw_state();
      - address: 0x6C
        value_type: U_WORD
        read_lambda: return 0;
      - address: 0x6D
        value_type: U_WORD
        read_lambda: return 0;
      - address: 0x6E
        value_type: U_WORD
        read_lambda: return id(pm_unknown3).get_raw_state();
      - address: 0x6F
        value_type: U_WORD
        read_lambda: return id(s_value).get_raw_state();
      - address: 0x70
        value_type: U_WORD
        read_lambda: return 0;
      - address: 0x71
        value_type: U_WORD
        read_lambda: return 0;
      - address: 0x72
        value_type: U_WORD
        read_lambda: return id(pm_unknown4).get_raw_state();
      - address: 0x73
        value_type: U_WORD
        read_lambda: return id(pm_pf).get_raw_state();
      - address: 0x74
        value_type: U_WORD
        read_lambda: return 0;
      - address: 0x75
        value_type: U_WORD
        read_lambda: return 0;
      - address: 0x76
        value_type: U_WORD
        read_lambda: return id(pm_unknown5).get_raw_state();
      - address: 0x77
        value_type: U_WORD
        read_lambda: return id(f_value).get_raw_state();
      - address: 0x78
        value_type: U_WORD
        read_lambda: return 0;
      - address: 0x79
        value_type: U_WORD
        read_lambda: return 0;
      - address: 0x7A
        value_type: U_WORD
        read_lambda: return 0;
      - address: 0x7B
        value_type: U_WORD
        read_lambda: return 0;
# serial number: 1400G0SM02049015
      - address: 0x203
        value_type: U_QWORD
        read_lambda: return 0x313430304730534DULL;
      - address: 0x207
        value_type: U_QWORD
        read_lambda: return 0x3032303439303135ULL;
      - address: 0x401
        value_type: U_QWORD
        read_lambda: return 0;
      - address: 0x405
        value_type: U_QWORD
        read_lambda: return 0;
      - address: 0x409
        value_type: U_QWORD
        read_lambda: return 0;
      - address: 0x40D
        value_type: U_QWORD
        read_lambda: return 0;
      - address: 0x411
        value_type: U_QWORD
        read_lambda: return 0;
      - address: 0x415
        value_type: U_QWORD
        read_lambda: return 0;
      - address: 0x419
        value_type: U_QWORD
        read_lambda: return 0;
      - address: 0x41D
        value_type: U_QWORD
        read_lambda: return 0;


