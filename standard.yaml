esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false

logger:
  level: DEBUG

debug:

wifi: !include wifi.yaml

api:
  encryption:
    key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

button:
  - platform: restart
    id: restart_button
    name: Restart

text_sensor:
  - platform: uptime
    name: Uptime
    update_interval: 60s

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 30s
